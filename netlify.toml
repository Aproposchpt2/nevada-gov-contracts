[build]
  publish = "."
  functions = "netlify/functions"

  [build.environment]
    NODE_VERSION = "18"

[functions]
  node_bundler = "esbuild"

[[redirects]]
  from = "/bids"
  to = "/index.html"
  status = 200

[[redirects]]
  from = "/promo"
  to = "/promo.html"
  status = 200

[[redirects]]
  from = "/pilot"
  to = "/promo.html"
  status = 200

[[redirects]]
  from = "/trial"
  to = "/promo.html"
  status = 200

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"

[[edge_functions]]
  path = "/"
  function = "stategen-nav-login-cta"

[[edge_functions]]
  path = "/index.html"
  function = "stategen-nav-login-cta"
